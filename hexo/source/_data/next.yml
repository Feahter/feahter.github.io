# NexT Theme Override

# Menu
menu:
  home: / || fa fa-home
  about: /about/ || fa fa-user
  tags: /tags/ || fa fa-tags
  categories: /categories/ || fa fa-th
  archives: /archives/ || fa fa-archive

menu_settings:
  badges: false

# Post excerpt — use <!-- more --> tag, not frontmatter description
excerpt_description: false
read_more_btn: true

# Local Search
local_search:
  enable: true
  top_n_per_article: 1
  unescape: false
  preload: false

# Font Settings — 14px via custom style
font:
  enable: false

# Custom style file
custom_file_path:
  head: source/_data/head.njk

# Footer
footer:
  since: 2016

# Reward settings
reward:
  enable: true
  comment: 坚持原创，感谢支持
  methods:
    - name: 微信
      path: /uploads/wx.png
    - name: 支付宝
      path: /uploads/zfb.jpg
